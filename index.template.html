<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engineering Drawing Checker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2'%3E%3Crect x='4' y='2' width='16' height='20' rx='2'/%3E%3Cpath d='M8 7h8M8 11h8M8 15l2 2 4-4'/%3E%3C/svg%3E">
<style>
  :root {
    --color-bg: #f1f5f9;
    --color-surface: #ffffff;
    --color-surface-muted: #f8fafc;
    --color-border: #e2e8f0;
    --color-border-strong: #cbd5e1;
    --color-text: #0f172a;
    --color-text-secondary: #64748b;
    --color-text-tertiary: #94a3b8;
    --color-primary: #2563eb;
    --color-primary-hover: #1d4ed8;
    --color-primary-soft: #eff6ff;
    --color-success: #15803d;
    --color-success-bg: #dcfce7;
    --color-success-border: #bbf7d0;
    --color-danger: #b91c1c;
    --color-danger-bg: #fee2e2;
    --color-danger-border: #fecaca;
    --color-warning: #b45309;
    --color-warning-bg: #fef3c7;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 2px 0 rgb(15 23 42 / 0.04);
    --shadow-md: 0 4px 16px -4px rgb(15 23 42 / 0.10), 0 2px 6px -2px rgb(15 23 42 / 0.06);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    margin: 0;
    background: var(--color-bg);
    color: var(--color-text);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  a, button, input, select { font-family: inherit; }

  :focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
    border-radius: var(--radius-sm);
  }

  .app-shell {
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 24px 64px;
  }

  .app-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .app-header__icon {
    flex: 0 0 auto;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--color-primary-soft);
    color: var(--color-primary);
    border-radius: var(--radius-md);
  }

  .app-header h1 {
    font-size: 19px;
    font-weight: 650;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .app-header p {
    margin: 2px 0 0;
    font-size: 13px;
    color: var(--color-text-secondary);
  }

  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    padding: 20px;
    margin-bottom: 20px;
  }

  .card__header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .card__title {
    font-size: 14px;
    font-weight: 650;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-secondary);
  }

  .card__hint {
    font-size: 12.5px;
    color: var(--color-text-tertiary);
  }

  /* Drop zone */
  #dropZone {
    border: 1.5px dashed var(--color-border-strong);
    border-radius: var(--radius-md);
    padding: 36px 20px;
    text-align: center;
    background: var(--color-surface-muted);
    transition: border-color 150ms ease, background-color 150ms ease;
  }

  #dropZone.is-dragover {
    border-color: var(--color-primary);
    background: var(--color-primary-soft);
  }

  #dropZone svg {
    color: var(--color-text-tertiary);
    margin-bottom: 8px;
  }

  #dropZone .drop-label {
    display: block;
    font-size: 14.5px;
    color: var(--color-text-secondary);
    margin-bottom: 4px;
  }

  #dropZone .drop-sub {
    display: block;
    font-size: 12.5px;
    color: var(--color-text-tertiary);
    margin-bottom: 14px;
  }

  /* Visually hidden but still keyboard-focusable, unlike display:none. */
  #fileInput {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }
  #fileInput:focus-visible + .btn-file-label,
  #fileInput:focus-visible ~ .btn-file-label {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  .btn-file-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  #progress {
    width: 100%;
    height: 6px;
    border: none;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 16px;
    appearance: none;
    background: var(--color-border);
  }
  #progress::-webkit-progress-bar { background: var(--color-border); border-radius: 999px; }
  #progress::-webkit-progress-value { background: var(--color-primary); border-radius: 999px; transition: width 150ms ease; }
  #progress::-moz-progress-bar { background: var(--color-primary); border-radius: 999px; }

  /* Buttons */
  .btn {
    appearance: none;
    border: 1px solid var(--color-border-strong);
    background: var(--color-surface);
    color: var(--color-text);
    font-size: 13.5px;
    font-weight: 550;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background-color 120ms ease, border-color 120ms ease, transform 80ms ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--color-surface-muted); border-color: var(--color-border-strong); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }

  .btn-danger {
    color: var(--color-danger);
    border-color: var(--color-danger-border);
    background: var(--color-danger-bg);
  }
  .btn-danger:hover { background: #fecaca; }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  /* Summary table */
  table { border-collapse: collapse; width: 100%; }
  thead th {
    text-align: left;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-tertiary);
    font-weight: 600;
    padding: 0 10px 8px;
    border-bottom: 1px solid var(--color-border);
  }
  tbody td {
    padding: 10px;
    border-bottom: 1px solid var(--color-border);
    font-size: 13.5px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--color-surface-muted); }
  #summaryTable tbody:empty::after,
  #summaryTable tbody:has(tr) ~ .empty-row { display: none; }

  .pass, .fail {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 600;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .pass { color: var(--color-success); background: var(--color-success-bg); }
  .fail { color: var(--color-danger); background: var(--color-danger-bg); }

  /* Rules manager — rule list */
  .rule-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .rule-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-surface-muted);
  }
  .rule-row.is-disabled { opacity: 0.6; }

  .rule-row__main {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    min-width: 0;
  }
  .rule-row__label {
    font-weight: 600;
    font-size: 13.5px;
    color: var(--color-text);
  }
  .rule-chips { display: inline-flex; gap: 6px; flex-wrap: wrap; }

  .rule-badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 2px 8px;
    border-radius: 999px;
    text-transform: lowercase;
  }
  .rule-badge--cat { background: var(--color-border); color: var(--color-text-secondary); }
  .rule-badge--error { background: var(--color-danger-bg); color: var(--color-danger); }
  .rule-badge--warn { background: var(--color-warning-bg); color: var(--color-warning); }
  .rule-badge--off { background: var(--color-border); color: var(--color-text-tertiary); text-transform: none; }

  .rule-row__actions { display: inline-flex; gap: 6px; flex: 0 0 auto; }

  .btn-sm { padding: 5px 10px; font-size: 12.5px; }

  .rules-empty {
    margin: 0 0 16px;
    padding: 20px;
    text-align: center;
    color: var(--color-text-tertiary);
    font-size: 13.5px;
    border: 1px dashed var(--color-border-strong);
    border-radius: var(--radius-md);
    background: var(--color-surface-muted);
  }

  .rules-toolbar {
    display: flex;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 14px;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--color-border);
  }
  .rules-toolbar__import { margin-bottom: 0; }

  .rule-editor__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .rule-editor__title {
    margin: 0;
    font-size: 14px;
    font-weight: 650;
    color: var(--color-text);
  }
  #ruleId[readonly] {
    background: var(--color-surface-muted);
    color: var(--color-text-secondary);
    cursor: not-allowed;
  }

  .field {
    margin-bottom: 12px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    margin-bottom: 4px;
  }
  .field-hint {
    display: block;
    font-size: 11.5px;
    color: var(--color-text-tertiary);
    margin-top: 3px;
  }
  .field input[type="text"],
  .field select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    font-size: 13.5px;
    color: var(--color-text);
  }
  .field input[type="text"]:focus, .field select:focus { border-color: var(--color-primary); }
  #rulePattern, #ruleFind, #ruleValid { font-family: var(--font-mono); font-size: 12.5px; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .field-checkbox {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .field-checkbox input { width: 16px; height: 16px; }

  #ruleEditor { padding-top: 4px; }

  .import-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  #importRules { font-size: 12.5px; color: var(--color-text-secondary); }

  hr.divider {
    border: none;
    border-top: 1px solid var(--color-border);
    margin: 16px 0;
  }
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <span class="app-header__icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 7h8M8 11h8M8 15l2 2 4-4"/></svg>
    </span>
    <div>
      <h1>Engineering Drawing Checker</h1>
      <p>Offline title-block, spelling, and formatting review for CAD-exported PDFs</p>
    </div>
  </header>
  <div id="app"></div>
</div>
<script>
  const WORKER_SOURCE = /*__WORKER_CODE__*/;
  window.__createWorker = function () {
    const blob = new Blob([WORKER_SOURCE], { type: 'application/javascript' });
    return new Worker(URL.createObjectURL(blob));
  };
</script>
<script>
/*__APP_CODE__*/
document.addEventListener('DOMContentLoaded', () => {
  window.__drawingCheckerApp = initApp(document.getElementById('app'));
});
</script>
</body>
</html>
