<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARX Tools — Drawing Checker &amp; PDF Text Editor</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2'%3E%3Crect x='4' y='2' width='16' height='20' rx='2'/%3E%3Cpath d='M8 7h8M8 11h8M8 15l2 2 4-4'/%3E%3C/svg%3E">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;height:100vh;background:#0b1220;color:#e2e8f0;overflow:hidden;
  }
  .topbar{
    display:flex;align-items:center;gap:14px;padding:9px 16px;
    background:#13203b;border-bottom:1px solid #334155;flex-wrap:wrap;flex:0 0 auto;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;margin-right:4px;letter-spacing:.2px}
  .brand svg{color:#38bdf8}
  .tabs{display:flex;gap:4px}
  .tab{
    padding:8px 16px;border-radius:8px;border:1px solid transparent;background:transparent;
    color:#94a3b8;font-weight:600;cursor:pointer;font-size:13.5px;font-family:inherit;
  }
  .tab:hover{color:#e2e8f0}
  .tab.active{background:#0b1220;color:#fff;border-color:#334155}
  .save{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12.5px;color:#94a3b8;flex-wrap:wrap}
  .save button{
    padding:7px 12px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;
    font-weight:600;cursor:pointer;font:inherit;font-size:12.5px;
  }
  .save button:hover{border-color:#38bdf8}
  .save .dir{color:#34d399;font-weight:700}
  .frames{position:relative;flex:1 1 auto;min-height:0}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
  iframe.hidden{visibility:hidden;z-index:-1}
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 7h8M8 11h8M8 15l2 2 4-4"/></svg>
      ARX Tools
    </span>
    <div class="tabs">
      <button class="tab active" data-tab="checker">Drawing Checker</button>
      <button class="tab" data-tab="editor">PDF Text Editor</button>
      <button class="tab" data-tab="rules">Rule Check</button>
    </div>
    <div class="save">
      <span id="saveInfo">Saves to your browser's Downloads folder</span>
      <button id="chooseDir" hidden>Choose download folder…</button>
      <button id="clearDir" hidden>Use Downloads</button>
    </div>
  </div>
  <div class="frames">
    <iframe id="frameChecker" title="Drawing Checker"></iframe>
    <iframe id="frameEditor" class="hidden" title="PDF Text Editor"></iframe>
    <iframe id="frameRules" class="hidden" title="Rule Check"></iframe>
  </div>

<script>
  // Each tool is embedded, unchanged and fully isolated, via srcdoc iframes.
  const CHECKER_HTML = /*__CHECKER_HTML__*/;
  const EDITOR_HTML  = /*__EDITOR_HTML__*/;
  const RULES_HTML   = /*__RULES_HTML__*/;
  document.getElementById('frameChecker').srcdoc = CHECKER_HTML;
  document.getElementById('frameEditor').srcdoc  = EDITOR_HTML;
  document.getElementById('frameRules').srcdoc   = RULES_HTML;

  // ---- tabs ----
  const frames = {
    checker: document.getElementById('frameChecker'),
    editor:  document.getElementById('frameEditor'),
    rules:   document.getElementById('frameRules'),
  };
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
    const which = t.dataset.tab;
    frames.checker.classList.toggle('hidden', which !== 'checker');
    frames.editor.classList.toggle('hidden', which !== 'editor');
    frames.rules.classList.toggle('hidden', which !== 'rules');
  }));

  // ---- shared "save location" (File System Access API) ----
  window.__saveDir = null;
  const supportsFS = typeof window.showDirectoryPicker === 'function';
  const chooseBtn = document.getElementById('chooseDir');
  const clearBtn  = document.getElementById('clearDir');
  const info      = document.getElementById('saveInfo');

  if (supportsFS) {
    chooseBtn.hidden = false;
    chooseBtn.addEventListener('click', async () => {
      try {
        const dir = await window.showDirectoryPicker({ mode: 'readwrite' });
        window.__saveDir = dir;
        info.innerHTML = 'Saving edited / annotated files to: <span class="dir">' + (dir.name || 'selected folder') + '</span>';
        clearBtn.hidden = false;
      } catch (e) { /* user cancelled the picker */ }
    });
    clearBtn.addEventListener('click', () => {
      window.__saveDir = null;
      info.textContent = "Saves to your browser's Downloads folder";
      clearBtn.hidden = true;
    });
  } else {
    info.textContent = "Saves to your browser's Downloads folder (a custom folder needs Chrome or Edge)";
  }

  // ---- shared saver, called by both tools from inside their iframes ----
  window.__saveOutputFile = async function (name, content, mime) {
    if (window.__saveDir) {
      try {
        const handle = await window.__saveDir.getFileHandle(name, { create: true });
        const writable = await handle.createWritable();
        await writable.write(content);          // string, TypedArray, or Blob
        await writable.close();
        return { saved: true, folder: true };
      } catch (e) { /* permission lost etc. — fall back to a normal download */ }
    }
    const blob = content instanceof Blob ? content : new Blob([content], { type: mime || 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    return { saved: true, folder: false };
  };
</script>
</body>
</html>
